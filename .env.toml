[application]
name="edge-router"
projectId = ""
location = "us-central1"
threadPoolSize = 20

[telemetry]
# project_id = "" # Fallback to application.projectId if not specified
service_name = "edge-router"
use_gcp = true


[ai_models.router]
model_name = "gemini-3.1-flash-lite-preview"
temperature = 1.0
top_p = 0.5
top_k = 40
output_format = "application/json"
max_tokens = 32000
api_key = ""
instructions = """
## Purpose
A purpose built router for edge services.
"""

[gemini.flash.thinking_config]
thinking_budget = 0

[server]
host = "0.0.0.0"
port = 8000

[[server.routers]]
name = "gemini"
provider = "gemini"
config_path = "gemini.flash"

[[server.routers]]
name = "gemma"
provider = "auto_local"
model_path = "models/gemma-3-12b-it-q4_k_m.gguf"
n_threads = 4

[[server.routers]]
name = "llama"
provider = "auto_local"
model_path = "models/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf"
n_threads = 4

