[application]
projectId = ""
location = "us-central1"
apiKey = ""
threadPoolSize = 20
root_gcs_bucket = "./data"


[gemini.flash]
model = "gemini-3.1-flash-lite-preview"
temperature = 1.0
topP = 0.5
topK = 40
outputFormat = "application/json"
maxTokens = 32000
instructions = """
## Purpose
A purpose built router for edge services.
"""

[gemini.thinking]
model = "gemini-3.1-pro-preview"
temperature = 0.2
topP = 0.5
topK = 30
outputFormat = "application/json"
maxTokens = 8192

[embeddings.gemini2]
model = "gemini-embedding-2-preview"
maxRequestPerMinute = 800

[telemetry]
# project_id = "" # Fallback to application.projectId if not specified
service_name = "edge-router"
use_gcp = true


[server]
host = "0.0.0.0"
port = 8000

[[server.routers]]
name = "gemini"
provider = "gemini"

[[server.routers]]
name = "gemma"
provider = "auto_local"
model_path = "packages/vllm_router/src/vllm_router/gemma-3-270m-it-qat-Q4_0.gguf"
n_threads = 4
