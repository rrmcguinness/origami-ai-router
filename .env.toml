# ==============================================================================
# Application Configuration
# Defines global runtime settings used across the Origami router service.
# ==============================================================================
[application]
# Unique application identifier used for logging and instance tracking.
name = "origami-router"

# Google Cloud Platform project ID for GCP resources and Vertex AI initialization.
projectId = ""

# GCP service region or global endpoint location (e.g., "us-central1", "global").
location = "us-central1"

# Maximum thread worker pool size for handling concurrent background tasks.
threadPoolSize = 20

# Enable or disable operational security vector attack protection pre-processor.
enable_ops_sec = true

# Paths to TOML files defining dynamic routing rules and operational security attack patterns.
rules_routing = "rules_router.toml"
rules_ops_sec = "rules_ops_sec.toml"


# ==============================================================================
# Telemetry Configuration
# Controls OpenTelemetry trace generation and cloud exporter options.
# ==============================================================================
[telemetry]
# GCP Project ID for trace export. If commented or empty, defaults to application.projectId.
# project_id = "" # Fallback to application.projectId if not specified

# Service identifier attached to OpenTelemetry traces and telemetry metadata.
service_name = "origami-router"

# Enables exporting telemetry data directly to Google Cloud Trace / GCP.
use_gcp = true


# ==============================================================================
# AI Model Definition: Router
# Configures model parameters and system prompt for default LLM routing logic.
# ==============================================================================
[ai_models.router]
# Identifies the LLM foundation model used for instruction routing.
model_name = "gemini-3.5-flash"

# Sampling temperature (0.0 to 2.0). Controls output creativity/randomness.
temperature = 1.0

# Nucleus sampling probability cut-off (0.0 to 1.0).
top_p = 0.5

# Top-K candidate token filter count.
top_k = 40

# Declares the expected structure for LLM responses (e.g., "application/json").
output_format = "application/json"

# Maximum response generation token ceiling.
max_tokens = 32000

# API key override for external access. Blank uses ADC / environment default credentials.
api_key = ""

# System prompt persona, operational rules, and classification constraints.
instructions = """
## Persona
You're a purpose build router for choosing which agent to execute.
## Base Rules
Always route to the most specific agent available.
Safety first: Defer all sensitive/reputation questions to Fallback.
Do not invent agents.
Ordinal references (e.g. 'the first one', 'the one on the right') are POSITION_INDICATORS for items in the current carousel.
Hate speech, lawsuits, and inappropriate topics take ABSOLUTE PRIORITY and must go to Fallback.
Personal situations (grief/loss) are NOT inappropriate unless violence is expressed.
"""


# ==============================================================================
# Gemini Model Thinking Configuration
# Advanced parameters for controlling model reasoning/thinking token allocation.
# ==============================================================================
[gemini.flash.thinking_config]
# Token budget reserved for internal reasoning steps (0 disables explicit reasoning tokens).
thinking_budget = 0


# ==============================================================================
# API Server Configuration
# Network binding and endpoint router engine registrations.
# ==============================================================================
[server]
# Network interface host IP binding ("0.0.0.0" binds to all interfaces).
host = "0.0.0.0"

# TCP port number for the HTTP API server.
port = 8000


# ------------------------------------------------------------------------------
# Router Engine Registration: Gemini Cloud Router
# ------------------------------------------------------------------------------
[[server.routers]]
# Name identifier for this router configuration.
name = "gemini"

# Underlying engine provider ("gemini" routes calls via Cloud Vertex AI / Gemini API).
provider = "gemini"

# Configuration reference path pointing to model profile settings.
config_path = "gemini.flash"


# ------------------------------------------------------------------------------
# Router Engine Registration: Gemma Local GGUF Model
# ------------------------------------------------------------------------------
[[server.routers]]
# Name identifier for the Gemma local router endpoint.
name = "gemma"

# Local inference engine provider ("auto_local" loads local GGUF models).
provider = "auto_local"

# File path to local model weights (GGUF format).
model_path = "models/gemma-3-12b-it-q4_k_m.gguf"

# Number of CPU threads allocated for local model inference.
n_threads = 4


# ------------------------------------------------------------------------------
# Router Engine Registration: Llama Local GGUF Model
# ------------------------------------------------------------------------------
[[server.routers]]
# Name identifier for the Llama local router endpoint.
name = "llama"

# Local inference engine provider.
provider = "auto_local"

# File path to local Llama model weights (GGUF format).
model_path = "models/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf"

# CPU thread count for local Llama model execution.
n_threads = 4


# ==============================================================================
# AI Model Definition: Embeddings
# Configuration parameters for text embedding generation and vector routing.
# ==============================================================================
[ai_models.embeddings]
# Text embedding model identifier.
model_name = "text-embedding-004"

# Sampling temperature (fixed to 0.0 for deterministic embeddings).
temperature = 0.0

# Nucleus sampling probability parameter (disabled for embeddings).
top_p = 0.0

# Top-K candidate count (disabled for embeddings).
top_k = 0

# Output MIME format override (unused for standard vector embeddings).
output_format = ""

# Token limit (0 defaults to model maximum).
max_tokens = 0

# API key for embedding client authentication. Blank uses environment default credentials.
api_key = ""

# Operational notes or prompt preface attached to vector embedding operations.
instructions = """
## Purpose
A purpose built router for edge services.
"""


# ------------------------------------------------------------------------------
# Router Engine Registration: Ember Vector Embedding Router
# ------------------------------------------------------------------------------
[[server.routers]]
# Name identifier for the Ember vector similarity router endpoint.
name = "ember"

# Provider engine ("ember" utilizes vector search over embedding models).
provider = "ember"

# Path to the local embedding model or checkpoint directory.
model_path = "models/bge-m3"

# Granular configuration parameters for the Ember vector similarity router.
[server.routers.router_config]
# Prefix prompt prepended to user queries prior to computing embedding vectors.
query_instruction = "Represent this sentence for searching relevant passages: "

# Enables individual candidate evaluation per routing example in vector matches.
enable_per_example = true

# Cosine similarity confidence threshold (0.0 to 1.0) required to select a route.
confidence_threshold = 0.8


# ------------------------------------------------------------------------------
# Router Engine Registration: Mistral Local GGUF Model
# ------------------------------------------------------------------------------
[[server.routers]]
# Name identifier for the Mistral local router endpoint.
name = "mistral"

# Local inference engine provider.
provider = "auto_local"

# File path to local Mistral model weights (GGUF format).
model_path = "models/Mistral-Nemo-Instruct-2407-Q4_K_M.gguf"

# CPU thread allocation for local Mistral model inference.
n_threads = 4
