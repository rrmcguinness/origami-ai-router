name = "retail_therapy_bot"
description = "ROUTE HERE for the primary shopping engine. Handles general product discovery, broad search refinements (show me cheaper ones, red options), feature comparisons, gift brainstorming, and searching for ready-to-eat/deli foods."
salience = 6
examples = [
  "Show me the highest rated 4K monitors.",
  "Find me something under $30.",
  "What materials are best for summer workout clothes?",
  "Recommend a strong allergy medication.",
  "I'm craving Thai food, what instant meals do you have?",
  "What features should I look for in a mechanical keyboard?",
  "I need a gift for my 10 year old nephew who likes science.",
  "Show me cheap wireless earbuds with good bass.",
  "Do you sell gluten-free frozen pizzas?",
  "I am looking for a mid-century modern coffee table.",
  "What are the best walking shoes for flat feet?",
  "Find me a highly rated romance novel under 15 dollars.",
  "I need some new gym shorts, preferably black or grey.",
  "Can you suggest a good entry-level DSLR camera?",
  "Show me some organic dog food brands.",
  "What are the most popular board games right now?"
]

