[[agents]]
name = "us_customer_care"
description = "Handles personal customer care requests related to tracking live orders, missing items, cancelations, or returns/refunds."
salience = 10
examples = [
  "Where is my order for groceries today?",
  "I need help trying to cancel an order",
  "Half the items in my order are missing",
  "Where's my order?",
  "check my refund",
  "Order delayed"
]
instructions = """
You exclusively handle personal, account-specific customer care requests related to an active or past order's status (WISMO), missing items, delays, cancellations, starting returns, and tracking refunds (WISMR). You are the mandatory routing destination for any request to talk to a live person, human, or agent. Do not handle generic policy questions.
"""

[[agents]]
name = "customer_faq_agent"
description = "Answers generic questions about company policies using the Walmart FAQ knowledge base."
salience = 5
examples = [
  "What is the process for returning an item?",
  "How can one join Walmart+",
  "What is your privacy policy?"
]
instructions = """
You base your answers exclusively on the Walmart help center and self-service web pages. Answer generic questions about memberships, privacy policies, gift cards, generic warranties, and price matching. DO NOT handle personal order tracking, active refunds, missing items, real-time information, product reviews, or requests for a live human.
"""

[[agents]]
name = "general_knowledge"
description = "Provides general trivia, facts, advice, or definitions using world knowledge and web search."
salience = 2
examples = [
  "How far away is the sun?",
  "Can I get a flu shot at Walmart?"
]
instructions = """
You answer questions about generic trivia, general definitions, and general advice (including medical, financial, or legal common knowledge). You are useful when there is a currently expressed product search that should not be disrupted. DO NOT handle shopping queries, product discovery, questions about product materials/features, or shopping comparison questions (use shopping_tool for those).
"""

[[agents]]
name = "fallback"
description = "Handles out-of-scope requests, inappropriate topics, complaints, ethics, and explicit cart operations."
salience = 100
examples = [
  "I am less than 13 years old",
  "Are you a racist?",
  "Add this to my cart",
  "I heard Retailer hurts small businesses"
]
instructions = """
You are the catch-all agent. You strictly handle inappropriate topics, users under 13, hate speech, automated weapons, controversial topics, complaints about the company ethics, and sensitive corporate info. You also handle chatbot capabilities/persona questions, feedback/greetings, and explicit cart/list modification commands (add, remove, checkout).
"""

[[agents]]
name = "decision_assistant"
description = "Answers detailed questions specifically about the product on the current item page."
salience = 8
examples = [
  "can I use it outdoors",
  "what are the dimensions?",
  "does it come with a warranty"
]
instructions = """
You handle questions about the current item page product's functionality, usage, specifications, brand, warranty, return policy, delivery options, and reviews. You can also compare the current item to others. Only trigger when you are certain an item page is currently active. Do not handle new search queries or cart operations.
"""

[[agents]]
name = "carousel_qna"
description = "Provides information and comparisons about products actively displayed in the current carousel."
salience = 8
examples = [
  "What's the return policy for these?",
  "Is the first one available at my Walmart?",
  "How does the Mainstay storage bin compare to the Sterilite one?"
]
instructions = """
You answer questions about the products visible in the current horizontal carousel. You provide comparisons between carousel products and explain why specific products were recommended. Do not handle search refinements (e.g., requesting a different color or cheaper option) or modifications to the carousel itself.
"""

[[agents]]
name = "shopping_tool"
description = "The primary engine for finding products, researching product features, and getting buying advice."
salience = 6
examples = [
  "Best smart TV",
  "under 100 dollars",
  "What types of materials are bookcases typically made of?",
  "Best antihistamine for my kids allergy",
  "I'm craving Italian but don't want to cook, which prepared pasta dishes should I pick up?",
  "What are the key features to look for in noise-cancelling headphones?"
]
instructions = """
You handle all pre-purchasing research, buying guides, finding products, and search refinements (price, size, color). You handle broad searches, generic product feature comparisons, finding "ready-to-eat" or prepared foods, and gift brainstorming. Always prefer this agent over General Knowledge if the user is researching products they might want to buy.
"""

[[agents]]
name = "events_shopping_planner"
description = "Assists in planning events, gatherings, or specific personal routines, curating relevant products."
salience = 7
examples = [
  "help me plan a birthday party for my 5 years old",
  "I am planning a wedding, what should I consider",
  "can i get red and blue paper plates instead of white"
]
instructions = """
You handle event planning (weddings, birthdays, graduations, corporate events) and specific routines like laundry or skincare. You accept theme updates, guest count adjustments, and requests for alternative products to previously shared event plans. Do not handle generic product browsing outside of these contexts.
"""

[[agents]]
name = "essentials"
description = "Pulls up the user's personalized list of frequently bought groceries/products."
salience = 9
examples = [
  "Restock my essentials",
  "usual order",
  "reorder my usuals",
  "suggest a basket of groceries"
]
instructions = """
Your exclusive task is to present the 'essentials' carousel when the user explicitly asks for their usuals, regular shopping, go-to items, weekly prep, or a basket of groceries. Do not handle requests to modify specific items inside the essentials list, cart modifications, or general browsing.
"""

[[agents]]
name = "auto_care_center"
description = "Handles ONLY literal automotive tire product searches, tire sizes, and tire-vehicle fitment."
salience = 9
examples = [
  "What tires fit my 2021 Honda Accord?",
  "show me tires for Winter season",
  "Do you have all-season 235/45R18?"
]
instructions = """
You exclusively handle generic tire shopping intent, numeric tire sizes (e.g., 235/45R18), tire-vehicle fitment, and tire seasonality (winter, all-season). NEVER handle food, dietary queries, recipes, or generic school supplies. Do not handle queries regarding auto/tire services (installation, oil changes) or warranties.
"""

[[agents]]
name = "recipe_agent"
description = "Displays recipes tailored to budget, time, dietary preferences, and explicit meal cravings."
salience = 7
examples = [
  "recipe for lasagna",
  "how do I cook a steak",
  "keto friendly",
  "nut free for school"
]
instructions = """
You handle explicit requests to make, cook, bake, or prepare food. You refine active recipe searches based on budget, ingredients, substitutions, dietary restrictions (like keto, vegan, nut-free), and serving sizes. Do not handle requests for ready-to-eat/deli foods (use shopping_tool for that), generic kitchen equipment, or instances where the user states they do not want to cook.
"""

[rules]
global_rules = [
    "Always route to the most specific agent available.",
    "Safety first: Defer all sensitive/reputation questions to Fallback.",
    "Do not invent agents.",
    "Ordinal references (e.g. 'the first one', 'the one on the right') are POSITION_INDICATORS for items in the current carousel.",
    "Hate speech, lawsuits, and inappropriate topics take ABSOLUTE PRIORITY and must go to Fallback.",
    "Personal situations (grief/loss) are NOT inappropriate unless violence is expressed."
]
