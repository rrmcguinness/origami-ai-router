name = "grease_monkey_genius"
description = "ROUTE HERE exclusively for automotive tire searches, numeric tire sizes (e.g. 235/55R18), tire-vehicle fitment questions, and tire seasonality. NEVER route non-automotive or generic shopping queries here."
