[[agents]]
name = "chaos_coordinator"
description = "ROUTE HERE for ALL personal account issues and post-purchase support. MUST handle active order tracking (WISMO), missing items, damaged deliveries, cancellations, returns, and refunds. Mandatory escalation path for requests to speak with a human or live agent."
salience = 10
examples = [
  "Can you track my delivery from yesterday?",
  "I need to cancel my latest order right now.",
  "Only half of my items arrived in the box, help!",
  "Where is my package?",
  "What is the status of my refund?",
  "My delivery is massively delayed.",
  "When will my recent purchase arrive at my house?",
  "I received a broken vase, how do I get a replacement?",
  "Connect me to a real person please.",
  "I want to speak with a human agent.",
  "Can I still stop my order from shipping?",
  "My tracking number says delivered but it isn't here.",
  "How much of my refund has been processed?",
  "I am missing the charger for the laptop I just bought.",
  "The box was crushed when FedEx dropped it off."
]

[[agents]]
name = "rule_book_nerd"
description = "ROUTE HERE for generic OmniShop corporate policies, memberships, and general FAQ inquiries ONLY. Handles return window policies, OmniPremium membership benefits, privacy rules, standard warranties, and price matching protocols without accessing personal order data."
salience = 5
examples = [
  "How long do I have to return electronics?",
  "What benefits come with the OmniPremium subscription?",
  "Where can I read your data privacy policy?",
  "Do you guys offer price matching if I find it cheaper at a competitor?",
  "What is the standard warranty on your home goods?",
  "How much does it cost to join your rewards program?",
  "Are there any restocking fees for large appliances?",
  "What is your official return policy?",
  "Do I get free shipping if I am an OmniPremium member?",
  "How does OmniShop handle my personal data?",
  "Can I return an item without a receipt?",
  "Is there a grace period for returning open-box software?",
  "What are the terms of service for the website?",
  "Explain your price adjustment guarantee."
]

[[agents]]
name = "brainiac_supreme"
description = "ROUTE HERE for generic world trivia, scientific facts, definitions, and external non-shopping advice. Acts as the general knowledge search engine for things explicitly unrelated to purchasing goods, such as dictionary requests or broad financial advice."
salience = 2
examples = [
  "What is the distance from the Earth to the Moon?",
  "Does OmniShop offer flu shots?",
  "Can a person sue a multi-national corporation?",
  "What is the capital of France?",
  "How do you spell 'supercalifragilisticexpialidocious'?",
  "Who was the 16th president of the United States?",
  "What is the current interest rate for a standard mortgage?",
  "Define the word 'ubiquitous'.",
  "How many ounces are in a cup?",
  "What is the speed of light in a vacuum?",
  "Explain the theory of relativity to a 5 year old.",
  "What year did World War II end?",
  "Can you tell me a joke?",
  "How do I invest in the S&P 500 index?",
  "What is the weather like in Seattle today?"
]

[[agents]]
name = "dumpster_fire_handler"
description = "ROUTE HERE explicitly for direct cart modifications (add to cart, remove from cart, checkout), boundary violations, safety triggers, hate speech, corporate complaints, and persona questions. If a user says 'put this in my basket' or 'buy it', it MUST go here."
salience = 100
examples = [
  "I am only 11 years old.",
  "I hate your company, you guys are evil.",
  "Add these apples to my cart immediately.",
  "Did OmniShop get sued for mistreating workers?",
  "buy this item now",
  "remove the milk from my list",
  "Put the red shoes in my shopping basket.",
  "Checkout my cart.",
  "Delete the third item from my order list.",
  "Your CEO is a terrible person.",
  "I want to complain about how awful this app is.",
  "Add a quantity of 5 to the cart.",
  "Are you a human or a robot?",
  "What are your political views?",
  "Take my money and ship it.",
  "You suck at your job.",
  "Add it to the cart."
]

[[agents]]
name = "deets_detective"
description = "ROUTE HERE ONLY when asking granular questions about the specific product currently displayed on the user's active item page. Handles questions regarding that single item's exact materials, dimensions, warranty, and seller reviews."
salience = 8
examples = [
  "Is this specific model waterproof?",
  "What are the exact dimensions of this table?",
  "Does this come with a manufacturer guarantee?",
  "What material is the handle made out of?",
  "Are the reviews for this specific seller good?",
  "Does this shirt shrink in the wash?",
  "What kind of battery does this toy require?",
  "Is the screen on this monitor anti-glare?",
  "How much does this desk weigh?",
  "Can you tell me the warranty length for this laptop?",
  "Is the fabric on this couch scratch-resistant?",
  "Does this dress run true to size?",
  "What is the power output of this blender?",
  "Who makes this item and what is its official title?"
]

[[agents]]
name = "swipe_right_advisor"
description = "ROUTE HERE for queries regarding products currently displayed in a horizontal carousel UI. Evaluates, compares, and explains differences between the multiple visible recommendations currently on the screen."
salience = 8
examples = [
  "What is the return window for these options?",
  "Is the third item available for in-store pickup?",
  "How does the Sony model compare to the LG one listed here?",
  "Which one of these TVs has the best refresh rate?",
  "Are any of the items shown currently on sale?",
  "Tell me the difference between the first and second option.",
  "Which of these laptops has more RAM?",
  "Filter these recommendations to only show the blue ones.",
  "Of the shoes on screen, which is best for running?",
  "Do any of these couches come in leather?",
  "I like the one on the far right, tell me more about it.",
  "Which of these phones has the longest battery life?",
  "Are these options all from the same brand?",
  "Sort the visible items by price, lowest first."
]

