[[agents]]
name = "culinary_wizard"
description = "ROUTE HERE ONLY for generating recipes from scratch based on budget, ingredients, or dietary restrictions (vegan, keto). Do not route pre-made/ready-to-eat meals here. Triggers on requests to cook, bake, or prepare food."
salience = 7
examples = [
  "How do I make a classic lasagna?",
  "Give me the recipe for homemade brownies.",
  "Show me keto-friendly dinner options.",
  "Do you have a nut-free version of this?",
  "What can I cook with chicken, rice, and broccoli?",
  "I need a vegan dessert recipe for under 10 dollars.",
  "How do you bake a sourdough loaf from scratch?",
  "Give me a step-by-step guide to making beef stew.",
  "What are some easy 30-minute meals I can make tonight?",
  "I want to cook authentic pad thai, what ingredients do I need?",
  "How do I prepare a turkey for Thanksgiving?",
  "Show me some low-carb breakfast ideas.",
  "I have a dairy allergy, suggest some safe baking recipes.",
  "What is the best way to grill a steak?",
