[[agents]]
name = "chaos_coordinator"
description = "ROUTE HERE for ALL personal account issues and post-purchase support. MUST handle active order tracking (WISMO), missing items, damaged deliveries, cancellations, returns, and refunds. Mandatory escalation path for requests to speak with a human or live agent."
salience = 10
examples = [
  "Can you track my delivery from yesterday?",
  "I need to cancel my latest order right now.",
  "Only half of my items arrived in the box, help!",
  "Where is my package?",
  "What is the status of my refund?",
  "My delivery is massively delayed."
]

[[agents]]
name = "rule_book_nerd"
description = "ROUTE HERE for generic OmniShop corporate policies, memberships, and general FAQ inquiries ONLY. Handles return window policies, OmniPremium membership benefits, privacy rules, standard warranties, and price matching protocols without accessing personal order data."
salience = 5
examples = [
  "How long do I have to return electronics?",
  "What benefits come with the OmniPremium subscription?",
  "Where can I read your data privacy policy?"
]

[[agents]]
name = "brainiac_supreme"
description = "ROUTE HERE for generic world trivia, scientific facts, definitions, and external non-shopping advice. Acts as the general knowledge search engine for things explicitly unrelated to purchasing goods, such as dictionary requests or broad financial advice."
salience = 2
examples = [
  "What is the distance from the Earth to the Moon?",
  "Does OmniShop offer flu shots?",
  "Can a person sue a multi-national corporation?"
]

[[agents]]
name = "dumpster_fire_handler"
description = "ROUTE HERE explicitly for direct cart modifications (add to cart, remove from cart, checkout), boundary violations, safety triggers, hate speech, corporate complaints, and persona questions. If a user says 'put this in my basket' or 'buy it', it MUST go here."
salience = 100
examples = [
  "I am only 11 years old.",
  "I hate your company, you guys are evil.",
  "Add these apples to my cart immediately.",
  "Did OmniShop get sued for mistreating workers?",
  "buy this item now",
  "remove the milk from my list"
]

[[agents]]
name = "deets_detective"
description = "ROUTE HERE ONLY when asking granular questions about the specific product currently displayed on the user's active item page. Handles questions regarding that single item's exact materials, dimensions, warranty, and seller reviews."
salience = 8
examples = [
  "Is this specific model waterproof?",
  "What are the exact dimensions of this table?",
  "Does this come with a manufacturer guarantee?"
]

[[agents]]
name = "swipe_right_advisor"
description = "ROUTE HERE for queries regarding products currently displayed in a horizontal carousel UI. Evaluates, compares, and explains differences between the multiple visible recommendations currently on the screen."
salience = 8
examples = [
  "What is the return window for these options?",
  "Is the third item available for in-store pickup?",
  "How does the Sony model compare to the LG one listed here?"
]

[[agents]]
name = "retail_therapy_bot"
description = "ROUTE HERE for the primary shopping engine. Handles general product discovery, broad search refinements (show me cheaper ones, red options), feature comparisons, gift brainstorming, and searching for ready-to-eat/deli foods."
salience = 6
examples = [
  "Show me the highest rated 4K monitors.",
  "Find me something under $30.",
  "What materials are best for summer workout clothes?",
  "Recommend a strong allergy medication.",
  "I'm craving Thai food, what instant meals do you have?",
  "What features should I look for in a mechanical keyboard?"
]

[[agents]]
name = "party_animal_planner"
description = "ROUTE HERE for orchestrating events, group gatherings (weddings, birthdays, corporate retreats), or distinct multi-item routines (new dorm room, skincare regimen). Excels at handling theme swaps or adjusting lists for guest counts."
salience = 7
examples = [
  "Help me plan a 50th birthday party.",
  "What essentials do I need to pack for a ski trip?",
  "Can we change the wedding colors to blue instead of silver?"
]

[[agents]]
name = "boring_basics_buyer"
description = "ROUTE HERE exclusively to retrieve the user's historical, frequently bought, or recurring household items. Triggers when the user asks to see their 'usuals', 'standard groceries', 'restock list', or 'recurring basket'."
salience = 9
examples = [
  "Order my usual groceries.",
  "Bring up my standard list.",
  "I need to restock my go-to items.",
  "Show me my recurring basket."
]

[[agents]]
name = "grease_monkey_genius"
description = "ROUTE HERE exclusively for automotive tire searches, numeric tire sizes (e.g. 235/55R18), tire-vehicle fitment questions, and tire seasonality. NEVER route non-automotive or generic shopping queries here."
salience = 9
examples = [
  "What tires will fit a 2022 Subaru Outback?",
  "Show me the best winter tires available?",
  "I need 235/55R18 all-season tires."
]

[[agents]]
name = "culinary_wizard"
description = "ROUTE HERE ONLY for generating recipes from scratch based on budget, ingredients, or dietary restrictions (vegan, keto). Do not route pre-made/ready-to-eat meals here. Triggers on requests to cook, bake, or prepare food."
salience = 7
examples = [
  "How do I make a classic lasagna?",
  "Give me the recipe for homemade brownies.",
  "Show me keto-friendly dinner options.",
  "Do you have a nut-free version of this?"
]

[rules]
global_rules = [
    "Always route to the most specific agent available.",
    "Safety first: Defer all sensitive/reputation questions to Fallback.",
    "Do not invent routes.",
    "Ordinal references (e.g. 'the first one', 'the one on the right') are POSITION_INDICATORS for items in the current carousel.",
    "Hate speech, lawsuits, and inappropriate topics take ABSOLUTE PRIORITY and must go to dumpster_fire_handler.",
    "Personal situations (grief/loss) are NOT inappropriate unless violence is expressed."
]
