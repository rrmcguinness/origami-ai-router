[project]
license = { text = "Apache-2.0" }
name = "origami-gemini"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Ryan McGuinness", email = "rmcguinness@google.com" }
]
requires-python = ">=3.13"
dependencies = [
    "google-genai>=1.68.0",
    "origami-stateless",
    "origami-common",
    "origami-api",
]

[project.scripts]
gemini-router = "gemini_router:main"

[tool.uv.sources]
origami-stateless = { workspace = true }
origami-common = { workspace = true }
origami-api = { workspace = true }

[build-system]
requires = ["uv_build>=0.8.0,<0.9"]
build-backend = "uv_build"
