[project]
license = { text = "Apache-2.0" }
name = "origami-ember"
version = "0.1.0"
description = "An in-memory embedding based router"
readme = "README.md"
authors = [
    { name = "Ryan McGuinness", email = "rmcguinness@google.com" }
]
requires-python = ">=3.13"
dependencies = [
    "flagembedding>=1.3.5",
    "numpy>=2.2.6",
    "origami-api",
    "origami-common",
    "pydantic>=2.12.5",
    "sentence-transformers>=5.3.0",
    "torch>=2.10.0",
    "transformers>=4.57.6",
]

[build-system]
requires = ["uv_build>=0.8.0,<0.9"]
build-backend = "uv_build"

[tool.uv.sources]
origami-api = { workspace = true }
origami-common = { workspace = true }
