[project]
license = { text = "Apache-2.0" }
name = "origami-stateless"
version = "0.1.0"
description = "Common abstractions and builder for stateless routers."
readme = "README.md"
authors = [
    { name = "Ryan McGuinness", email = "rmcguinness@google.com" }
]
requires-python = ">=3.13"
dependencies = [
    "pydantic>=2.10.0",
    "origami-api",
    "origami-ops-sec",
]

[tool.uv.sources]
origami-api = { workspace = true }
origami-ops-sec = { workspace = true }

[build-system]
requires = ["uv_build>=0.8.0,<0.9"]
build-backend = "uv_build"
